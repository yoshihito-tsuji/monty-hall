<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>モンティホール問題 体験シミュレーター</title>
<style>
  :root {
    --paper: #faf3e3;
    --card: #fffdf7;
    --card-border: #e8dcc3;
    --ink: #4a3b2a;
    --ink-soft: #8a7a63;
    --wood: #c98544;
    --wood-dark: #a5691f;
    --wood-edge: #7a4e17;
    --accent: #2a78d6;
    --accent-dark: #1c5cab;
    --win: #e34948;
    --chart-surface: #fcfcfb;
    --series-switch: #2a78d6;   /* 変える作戦 */
    --series-stay: #008300;     /* 変えない作戦 */
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: "Hiragino Maru Gothic ProN", "BIZ UDGothic", "Yu Gothic", system-ui, sans-serif;
    line-height: 1.8;
    padding: 24px 16px 64px;
  }
  main { max-width: 860px; margin: 0 auto; }

  /* ---------- 見出し ---------- */
  header { text-align: center; margin-bottom: 24px; }
  header h1 {
    font-size: 1.7rem;
    letter-spacing: 0.05em;
    color: var(--ink);
  }
  header p { color: var(--ink-soft); font-size: 0.95rem; margin-top: 4px; }

  .card {
    background: var(--card);
    border: 2px solid var(--card-border);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 24px;
  }
  .card > h2 {
    font-size: 1.15rem;
    margin-bottom: 12px;
    padding-inline-start: 12px;
    border-inline-start: 6px solid var(--wood);
    line-height: 1.4;
  }

  /* ---------- 手順ステップ ---------- */
  .steps { display: flex; gap: 8px; flex-wrap: wrap; }
  .step {
    flex: 1 1 150px;
    display: flex; align-items: center; gap: 10px;
    background: #f5eeda;
    border: 2px solid transparent;
    border-radius: 14px;
    padding: 10px 12px;
    font-size: 0.88rem;
    color: var(--ink-soft);
    transition: all 0.3s;
  }
  .step .num {
    flex: none;
    width: 30px; height: 30px;
    border-radius: 50%;
    background: #d9cdb2;
    color: #fff;
    font-weight: bold;
    display: grid; place-items: center;
  }
  .step.active {
    background: #fff;
    border-color: var(--accent);
    color: var(--ink);
    box-shadow: 0 3px 0 rgba(42,120,214,0.25);
  }
  .step.active .num { background: var(--accent); }
  .step.done { color: var(--ink-soft); }
  .step.done .num { background: #9fc78a; }
  .step.done .num::before { content: "✓"; }
  .step.done .num span { display: none; }

  /* ---------- 司会者のふきだし ---------- */
  .host-area { display: flex; gap: 14px; align-items: flex-start; margin-bottom: 20px; }
  .host-face { flex: none; width: 72px; }
  .bubble {
    position: relative;
    flex: 1;
    background: #fff;
    border: 2px solid var(--card-border);
    border-radius: 16px;
    padding: 14px 18px;
    font-size: 1rem;
    min-height: 72px;
    display: flex; align-items: center;
  }
  .bubble::before {
    content: "";
    position: absolute;
    left: -12px; top: 26px;
    border: 8px solid transparent;
    border-right-color: var(--card-border);
  }
  .bubble::after {
    content: "";
    position: absolute;
    left: -9px; top: 27px;
    border: 7px solid transparent;
    border-right-color: #fff;
  }
  .bubble strong { color: var(--accent-dark); }

  /* ---------- 扉 ---------- */
  .stage {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    padding: 10px 0 4px;
  }
  .door-unit { text-align: center; }
  .door-label {
    display: inline-block;
    background: var(--wood-dark);
    color: #fff;
    font-weight: bold;
    border-radius: 999px;
    padding: 1px 16px;
    font-size: 0.9rem;
    margin-bottom: 8px;
  }
  .door-frame {
    position: relative;
    width: 150px; height: 210px;
    background: #efe6cf;
    border: 3px solid var(--wood-edge);
    border-radius: 10px 10px 4px 4px;
    perspective: 700px;
    overflow: visible;
  }
  .prize {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 4px;
    border-radius: 7px 7px 2px 2px;
    background: #fdf9ee;
  }
  .prize .prize-name { font-size: 0.85rem; font-weight: bold; color: var(--ink-soft); }
  .door {
    position: absolute; inset: 0;
    background: linear-gradient(#d69352, var(--wood));
    border: 3px solid var(--wood-edge);
    border-radius: 8px 8px 2px 2px;
    transform-origin: left center;
    transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
    backface-visibility: hidden;
  }
  .door .panel {
    position: absolute;
    left: 18%; width: 64%;
    border: 3px solid var(--wood-dark);
    border-radius: 4px;
  }
  .door .panel.top { top: 10%; height: 34%; }
  .door .panel.bottom { top: 54%; height: 34%; }
  .door .knob {
    position: absolute;
    inset-inline-end: 10px; top: 48%;
    width: 13px; height: 13px;
    border-radius: 50%;
    background: #f4c95d;
    border: 2px solid var(--wood-edge);
  }
  .door-unit.open .door { transform: rotateY(-105deg); cursor: default; }
  .door-unit.selectable .door:hover { box-shadow: 0 0 0 5px rgba(42,120,214,0.45); }
  .door-unit.chosen .door-frame { box-shadow: 0 0 0 5px var(--accent); }
  .door-unit .tag {
    margin-top: 8px;
    font-size: 0.82rem;
    font-weight: bold;
    color: var(--accent-dark);
    min-height: 1.6em;
  }

  /* ---------- 操作ボタン ---------- */
  .actions {
    display: flex; justify-content: center; gap: 16px;
    flex-wrap: wrap; margin-top: 20px;
  }
  button {
    font-family: inherit;
    font-size: 1rem;
    font-weight: bold;
    border-radius: 999px;
    border: none;
    padding: 12px 28px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  button:active { transform: translateY(2px); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary {
    background: var(--accent); color: #fff;
    box-shadow: 0 4px 0 var(--accent-dark);
  }
  .btn-secondary {
    background: #fff; color: var(--ink);
    border: 2px solid var(--card-border);
    box-shadow: 0 4px 0 var(--card-border);
  }
  .btn-sim {
    background: #fff; color: var(--accent-dark);
    border: 2px solid var(--accent);
    box-shadow: 0 3px 0 rgba(42,120,214,0.35);
    padding: 10px 22px;
  }
  .btn-note {
    display: block;
    font-size: 0.75rem;
    font-weight: normal;
    color: inherit;
    opacity: 0.75;
  }

  /* ---------- 進行モードの表示 ---------- */
  .flow-note {
    text-align: center;
    font-size: 0.85rem;
    color: var(--ink-soft);
    margin-top: 14px;
  }
  .flow-note button {
    font-size: 0.8rem;
    font-weight: normal;
    padding: 4px 14px;
    margin-inline-start: 8px;
    background: #fff;
    color: var(--accent-dark);
    border: 2px solid var(--card-border);
    border-radius: 999px;
    box-shadow: none;
  }
  .flow-note button:hover { border-color: var(--accent); }

  /* ---------- 結果バナー ---------- */
  .result-banner {
    display: none;
    text-align: center;
    font-size: 1.25rem;
    font-weight: bold;
    border-radius: 14px;
    padding: 12px;
    margin-top: 18px;
  }
  .result-banner.win { display: block; background: #fdeaea; color: var(--win); }
  .result-banner.lose { display: block; background: #ececec; color: #666; }

  /* ---------- 記録表 ---------- */
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.95rem;
  }
  th, td {
    padding: 8px 10px;
    text-align: center;
    border-bottom: 1px solid var(--card-border);
  }
  th { color: var(--ink-soft); font-weight: normal; font-size: 0.85rem; }
  td.strategy { text-align: start; font-weight: bold; }
  .dot {
    display: inline-block;
    width: 12px; height: 12px;
    border-radius: 3px;
    margin-inline-end: 6px;
    vertical-align: baseline;
  }
  .dot.switch { background: var(--series-switch); }
  .dot.stay { background: var(--series-stay); }
  td.rate { font-weight: bold; font-variant-numeric: tabular-nums; }

  /* ---------- グラフ ---------- */
  .chart {
    background: var(--chart-surface);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 20px 20px 30px;
    margin-top: 16px;
  }
  .chart-title { font-size: 0.88rem; color: var(--ink-soft); margin-bottom: 14px; }
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .bar-row .bar-name { flex: none; width: 110px; font-size: 0.85rem; text-align: end; }
  .bar-track {
    position: relative;
    flex: 1; height: 26px;
    background: #f1f0ea;
    border-radius: 4px;
  }
  .bar-fill {
    position: absolute; inset-inline-start: 0; top: 0; bottom: 0;
    width: 0%;
    border-radius: 0 4px 4px 0;
    transition: width 0.7s ease;
  }
  .bar-fill.switch { background: var(--series-switch); }
  .bar-fill.stay { background: var(--series-stay); }
  .bar-val {
    flex: none;
    text-align: end;
    min-width: 168px;
    font-size: 0.82rem;
    font-weight: bold;
    color: var(--ink);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .ref-line {
    position: absolute; top: -6px; bottom: -6px;
    border-inline-start: 2px dashed #b3a98f;
  }
  .ref-label {
    position: absolute;
    top: 100%;
    transform: translateX(-50%);
    font-size: 0.72rem;
    color: var(--ink-soft);
    white-space: nowrap;
    padding-top: 2px;
  }
  .sim-status {
    text-align: center;
    font-size: 0.9rem;
    color: var(--ink-soft);
    min-height: 1.8em;
    margin-top: 10px;
  }

  /* ---------- なぜ？の図解 ---------- */
  .why-case {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    padding: 12px;
    border: 1px solid var(--card-border);
    border-radius: 12px;
    margin-bottom: 12px;
    background: #fffdf5;
  }
  .mini-doors-wrap { flex: none; }
  .pick-caption {
    font-size: 0.72rem;
    font-weight: bold;
    color: var(--accent-dark);
    line-height: 1.4;
    margin-bottom: 3px;
  }
  .mini-doors { display: flex; gap: 6px; }
  .mini-door {
    width: 44px; height: 60px;
    border-radius: 4px;
    border: 2px solid var(--wood-edge);
    display: grid; place-items: center;
    font-size: 1.3rem;
    background: linear-gradient(#d69352, var(--wood));
    position: relative;
  }
  .mini-door.revealed { background: #fdf9ee; }
  .why-text { flex: 1; min-width: 220px; font-size: 0.9rem; }
  .why-text .outcome-win { color: var(--win); font-weight: bold; }
  .why-text .outcome-lose { color: #888; font-weight: bold; }

  /* ---------- 扉の数を変える拡張版 ---------- */
  .ext-controls {
    background: #f5eeda;
    border-radius: 14px;
    padding: 14px 16px;
  }
  .ctrl-row {
    display: flex; align-items: center; gap: 8px;
    flex-wrap: wrap;
  }
  .ctrl-row + .ctrl-row { margin-top: 10px; }
  .ctrl-label {
    flex: none;
    width: 96px;
    font-size: 0.88rem;
    font-weight: bold;
    color: var(--ink);
  }
  .chip {
    font-size: 0.88rem;
    font-weight: normal;
    padding: 7px 16px;
    border-radius: 999px;
    background: #fff;
    color: var(--ink);
    border: 2px solid var(--card-border);
    box-shadow: none;
  }
  .chip.on {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: bold;
  }
  .num-wrap { font-size: 0.85rem; color: var(--ink-soft); }
  .num-wrap input {
    width: 72px;
    font-family: inherit;
    font-size: 0.9rem;
    padding: 5px 8px;
    border-radius: 8px;
    border: 2px solid var(--card-border);
    background: #fff;
    color: var(--ink);
    text-align: right;
  }
  .ext-stage {
    display: grid;
    gap: 6px;
    justify-content: center;
    max-width: 560px;
    margin: 18px auto 4px;
  }
  .mini {
    position: relative;
    aspect-ratio: 3 / 4;
    border-radius: 5px;
    border: 2px solid var(--wood-edge);
    background: linear-gradient(#d69352, var(--wood));
    display: grid; place-items: center;
    font-size: 0.72rem;
    color: #fff5e2;
    cursor: pointer;
    transition: transform 0.35s, box-shadow 0.15s;
    transform-style: preserve-3d;
  }
  .mini .knob-dot {
    position: absolute;
    inset-inline-end: 12%; top: 46%;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #f4c95d;
    border: 1px solid var(--wood-edge);
  }
  .ext-stage.pickable .mini:hover { box-shadow: 0 0 0 3px rgba(42,120,214,0.5); }
  .mini.open {
    background: #fdf9ee;
    transform: rotateY(-32deg) scale(0.94);
    cursor: default;
    font-size: 1.1rem;
  }
  .mini.open .knob-dot { display: none; }
  .mini.picked { box-shadow: 0 0 0 3px var(--accent); }
  .mini.final { box-shadow: 0 0 0 3px var(--win); }
  .ext-stage.switchable .mini:not(.open):not(.picked) { cursor: pointer; }
  .ext-stage.switchable .mini:not(.open):not(.picked):hover { box-shadow: 0 0 0 3px rgba(42,120,214,0.5); }
  .mini-caption {
    text-align: center;
    font-size: 0.8rem;
    color: var(--ink-soft);
    margin-top: 8px;
  }

  /* ---------- 言語切り替え ---------- */
  .langbar { display: flex; justify-content: flex-end; margin-bottom: 8px; position: relative; }
  .lang-btn {
    display: inline-flex; align-items: center; gap: 7px;
    font-size: 0.88rem; font-weight: normal;
    padding: 7px 14px;
    border-radius: 999px;
    background: var(--card);
    color: var(--ink);
    border: 2px solid var(--card-border);
    box-shadow: none;
  }
  .lang-btn:hover { border-color: var(--accent); color: var(--accent-dark); }
  .lang-btn .caret { font-size: 0.7rem; opacity: 0.7; }
  .lang-menu {
    position: absolute; top: calc(100% + 6px); inset-inline-end: 0;
    z-index: 20;
    list-style: none;
    background: var(--card);
    border: 2px solid var(--card-border);
    border-radius: 14px;
    padding: 6px;
    min-width: 180px;
    max-height: 70vh; overflow-y: auto;
    box-shadow: 0 8px 24px rgba(74,59,42,0.14);
  }
  .lang-menu li {
    padding: 8px 14px;
    border-radius: 10px;
    font-size: 0.9rem;
    cursor: pointer;
    white-space: nowrap;
  }
  .lang-menu li:hover { background: #f5eeda; }
  .lang-menu li.on { background: var(--accent); color: #fff; font-weight: bold; }

  /* ---------- 右から左に読む言語（アラビア語） ---------- */
  [dir="rtl"] .bubble::before { left: auto; right: -12px; border-right-color: transparent; border-left-color: var(--card-border); }
  [dir="rtl"] .bubble::after  { left: auto; right: -9px;  border-right-color: transparent; border-left-color: #fff; }
  [dir="rtl"] .bar-fill { border-radius: 4px 0 0 4px; }
  [dir="rtl"] .door { transform-origin: right center; }
  [dir="rtl"] .door-unit.open .door { transform: rotateY(105deg); }
  [dir="rtl"] .mini.open { transform: rotateY(32deg) scale(0.94); }

  footer {
    text-align: center;
    color: var(--ink-soft);
    font-size: 0.82rem;
    margin-top: 8px;
  }
  footer a { color: var(--accent-dark); }

  /* 狭い画面でも3つの扉は必ず1行に並べる（並べて見比べる教材のため） */
  @media (max-width: 560px) {
    body { padding: 16px 8px 48px; }
    .card { padding: 18px 12px; }
    .stage { gap: 8px; }
    .door-frame { width: 88px; height: 128px; }
    .prize svg { width: 62px; }
    .prize .prize-name { font-size: 0.75rem; }
    .door-label { font-size: 0.78rem; padding: 1px 10px; }
    .door-unit .tag { font-size: 0.7rem; }
    /* 棒が細くなりすぎるので、名前と数値を上の行に、棒を全幅に置く */
    .bar-row { flex-wrap: wrap; row-gap: 6px; margin-bottom: 22px; }
    .bar-row .bar-name { order: 1; width: auto; flex: 1 1 auto; text-align: left; font-size: 0.8rem; }
    .bar-val { order: 2; min-width: 0; font-size: 0.76rem; text-align: right; }
    .bar-track { order: 3; flex: 1 0 100%; }
    .ctrl-label { width: 100%; }
    .chip { font-size: 0.82rem; padding: 6px 12px; }
    .host-face { width: 52px; }
    .bubble { padding: 12px 14px; font-size: 0.92rem; }
    th, td { padding: 7px 4px; font-size: 0.85rem; }
    th { font-size: 0.75rem; }
  }
</style>
</head>
<body>
<main>
  <div class="langbar">
    <button class="lang-btn" id="langBtn" aria-haspopup="listbox" aria-expanded="false">
      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
        <circle cx="12" cy="12" r="9.2" fill="none" stroke="currentColor" stroke-width="1.8"/>
        <ellipse cx="12" cy="12" rx="4" ry="9.2" fill="none" stroke="currentColor" stroke-width="1.6"/>
        <path d="M3.2 9.2h17.6M3.2 14.8h17.6" fill="none" stroke="currentColor" stroke-width="1.6"/>
      </svg>
      <span id="langBtnLabel">Language</span>
      <span class="caret" aria-hidden="true">▾</span>
    </button>
    <ul class="lang-menu" id="langMenu" role="listbox" aria-label="Language" hidden></ul>
  </div>

  <header>
    <h1><span aria-hidden="true">🚪</span> <span data-i18n="header.title"></span></h1>
    <p data-i18n="header.sub"></p>
  </header>

  <!-- 手順 -->
  <section class="card">
    <h2 data-i18n="steps.title"></h2>
    <div class="steps">
      <div class="step" id="step1"><div class="num"><span>1</span></div><div data-i18n="steps.s1"></div></div>
      <div class="step" id="step2"><div class="num"><span>2</span></div><div data-i18n="steps.s2"></div></div>
      <div class="step" id="step3"><div class="num"><span>3</span></div><div data-i18n="steps.s3"></div></div>
      <div class="step" id="step4"><div class="num"><span>4</span></div><div data-i18n="steps.s4"></div></div>
    </div>
  </section>

  <!-- ゲーム本体 -->
  <section class="card">
    <div class="host-area">
      <svg class="host-face" viewBox="0 0 80 80" role="img" aria-label="Host">
        <circle cx="40" cy="34" r="24" fill="#ecebe8" stroke="#84837e" stroke-width="2.5"/>
        <path d="M18 30 Q22 10 40 12 Q58 10 62 30 Q56 20 40 20 Q24 20 18 30 Z" fill="#adaca7" stroke="#84837e" stroke-width="2"/>
        <circle cx="32" cy="33" r="2.6" fill="#84837e"/>
        <circle cx="48" cy="33" r="2.6" fill="#84837e"/>
        <path d="M33 44 Q40 50 47 44" fill="none" stroke="#84837e" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M28 62 L40 66 L52 62 L52 76 L28 76 Z" fill="#c7c6c2" stroke="#84837e" stroke-width="2.5"/>
        <path d="M34 62 L40 66 L46 62 L40 58 Z" fill="#adaca7" stroke="#84837e" stroke-width="2"/>
      </svg>
      <div class="bubble"><p id="message" aria-live="polite"></p></div>
    </div>

    <div class="stage" id="stage"></div>

    <div class="actions" id="advanceArea" style="display:none;">
      <button class="btn-primary" id="btnOk"><span data-i18n="flow.btnOk"></span><span class="btn-note" data-i18n="flow.btnOkNote"></span></button>
      <button class="btn-secondary" id="btnAuto"><span data-i18n="flow.btnAuto"></span><span class="btn-note" data-i18n="flow.btnAutoNote"></span></button>
    </div>

    <div class="actions" id="decisionArea" style="display:none;">
      <button class="btn-primary" id="btnSwitch"><span data-i18n="game.btnSwitch"></span><span class="btn-note" id="switchNote"></span></button>
      <button class="btn-secondary" id="btnStay"><span data-i18n="game.btnStay"></span><span class="btn-note" id="stayNote"></span></button>
    </div>

    <div class="result-banner" id="resultBanner"></div>

    <div class="actions" id="retryArea" style="display:none;">
      <button class="btn-primary" id="btnRetry" data-i18n="game.retry"></button>
    </div>

    <p class="flow-note" id="flowNote" style="display:none;"><span data-i18n="flow.autoNow"></span><button id="btnStepMode" data-i18n="flow.btnStep"></button></p>
  </section>

  <!-- 手であそんだ記録 -->
  <section class="card">
    <h2 data-i18n="record.title"></h2>
    <p style="font-size:0.9rem; color:var(--ink-soft); margin-bottom:10px;" data-i18n="record.lead"></p>
    <table>
      <thead>
        <tr><th style="text-align:left;" data-i18n="record.thStrategy"></th><th data-i18n="record.thPlayed"></th><th data-i18n="record.thWon"></th><th data-i18n="record.thRate"></th></tr>
      </thead>

  // 辞書から文言を取り出し、{n} などを値で置き換える
  function t(key, vars) {
    const dict = I18N[LANG] || I18N.ja;
    let s = dict[key];
    if (s === undefined) s = I18N.ja[key];
    if (s === undefined) return key;
    if (vars) {
      Object.keys(vars).forEach((k) => { s = s.split("{" + k + "}").join(vars[k]); });
    }
    return s;
  }

  // 数値をその言語の書き方で整える（小数点はロシア語などでコンマになる）
  function num(v, digits) {
    try {
      return v.toLocaleString(LANG, {
        minimumFractionDigits: digits, maximumFractionDigits: digits, useGrouping: false
      });
    } catch (e) {
      return v.toFixed(digits);
    }
  }

      <ellipse cx="55" cy="52" rx="30" ry="20" fill="#f5f0e6" stroke="#4a3b2a" stroke-width="3"/>
      <rect x="36" y="66" width="7" height="16" rx="3" fill="#f5f0e6" stroke="#4a3b2a" stroke-width="2.5"/>
      <rect x="66" y="66" width="7" height="16" rx="3" fill="#f5f0e6" stroke="#4a3b2a" stroke-width="2.5"/>
      <path d="M24 50 Q18 54 20 60" fill="none" stroke="#4a3b2a" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="86" cy="36" r="15" fill="#f5f0e6" stroke="#4a3b2a" stroke-width="3"/>
      <path d="M78 24 Q72 14 78 8" fill="none" stroke="#8a7a63" stroke-width="4" stroke-linecap="round"/>
      <path d="M92 23 Q97 13 92 7" fill="none" stroke="#8a7a63" stroke-width="4" stroke-linecap="round"/>
      <path d="M74 34 Q66 32 64 38 Q70 42 75 39 Z" fill="#e8dcc3" stroke="#4a3b2a" stroke-width="2"/>
      <circle cx="90" cy="34" r="2.4" fill="#4a3b2a"/>
      <path d="M97 44 Q98 50 94 52" fill="none" stroke="#4a3b2a" stroke-width="2.5" stroke-linecap="round"/>
      <ellipse cx="98" cy="41" rx="3" ry="2" fill="#f0b9b9" stroke="#4a3b2a" stroke-width="1.5"/>
    </svg>`;

  /* ---------- 状態 ---------- */
  let carDoor = 0;       // 新車のある扉 (0-2)
  let picked = -1;       // プレイヤーがえらんだ扉
  let opened = -1;       // 司会者が開けた扉
  let phase = "pick";    // pick → decide → result
  const manual = { switch: { total: 0, win: 0 }, stay: { total: 0, win: 0 } };
  const sim = { switch: { total: 0, win: 0 }, stay: { total: 0, win: 0 } };

  const $ = (id) => document.getElementById(id);
  const stage = $("stage");
  const message = $("message");

  /* ---------- 進行モード（OKで1つずつ / AUTOで自動） ---------- */
  // "step" … 司会者のセリフごとに OK を待つ。"auto" … 従来のペースで自動的に進む。
  let flowMode = "step";
  try {
    const savedFlow = localStorage.getItem("mh_flow");
    if (savedFlow === "auto" || savedFlow === "step") flowMode = savedFlow;
  } catch (e) { /* 参照できなければ既定のまま */ }

  const pendingNext = {};   // OK待ち中の「次に進む処理」を停止点ごとに持つ

  function setFlowMode(m) {
    flowMode = m;
    try { localStorage.setItem("mh_flow", m); } catch (e) { /* 保存できなくても続行 */ }
    renderFlowNotes();
  }

  function renderFlowNotes() {
    const show = flowMode === "auto" ? "block" : "none";
    $("flowNote").style.display = show;
    $("extFlowNote").style.display = show;
  }

  // 対話の停止点。step なら OK/AUTO ボタンを出して待ち、auto なら autoDelay ミリ秒後に進む
  function waitForOk(areaId, autoDelay, next) {
    if (flowMode === "auto") { setTimeout(next, autoDelay); return; }
    pendingNext[areaId] = next;
    $(areaId).style.display = "flex";
  }

  function advanceFrom(areaId, toAuto) {
    const next = pendingNext[areaId];
    if (!next) return;
    pendingNext[areaId] = null;
    $(areaId).style.display = "none";
    if (toAuto) setFlowMode("auto");
    next();
  }

  function cancelPending(areaId) {
    pendingNext[areaId] = null;
    $(areaId).style.display = "none";
  }

  /* ---------- 扉の生成 ---------- */
  function buildDoors() {
    stage.innerHTML = "";
    for (let i = 0; i < 3; i++) {
      const unit = document.createElement("div");
      unit.className = "door-unit selectable";
      unit.dataset.index = i;
      unit.innerHTML = `
        <div class="door-label">${t("game.doorLabel", { n: i + 1 })}</div>
        <div class="door-frame">
          <div class="prize">${i === carDoor ? carSVG : goatSVG}
            <span class="prize-name">${i === carDoor ? t("game.prizeCar") : t("game.prizeGoat")}</span></div>
          <div class="door" role="button" tabindex="0" aria-label="${t("game.pickAria", { n: i + 1 })}">
            <div class="panel top"></div><div class="panel bottom"></div><div class="knob"></div>
          </div>
        </div>
        <div class="tag"></div>`;
      const door = unit.querySelector(".door");
      door.addEventListener("click", () => pickDoor(i));
      door.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); pickDoor(i); }
      });
      stage.appendChild(unit);
    }
  }

  function unitAt(i) { return stage.children[i]; }

  function setSteps(current) {
    for (let n = 1; n <= 4; n++) {
      const el = $("step" + n);
      el.classList.toggle("active", n === current);
      el.classList.toggle("done", n < current);
    }
  }

  /* ---------- 1ゲームの流れ ---------- */
  function newGame() {
    carDoor = Math.floor(Math.random() * 3);
    picked = -1; opened = -1; phase = "pick";
    buildDoors();
    setSteps(1);
    cancelPending("advanceArea");
    $("decisionArea").style.display = "none";
    $("retryArea").style.display = "none";
    const banner = $("resultBanner");
    banner.className = "result-banner"; banner.textContent = "";
    message.innerHTML = t("game.intro_html");
  }

  function pickDoor(i) {
    if (phase !== "pick") return;
    phase = "hostOpening";
    picked = i;
    for (let k = 0; k < 3; k++) unitAt(k).classList.remove("selectable");
    unitAt(i).classList.add("chosen");
    unitAt(i).querySelector(".tag").textContent = t("game.tagYours");
    setSteps(2);
    message.innerHTML = t("game.picked_html", { n: i + 1 });

    // ヤギのいる扉を1つ開ける（えらばれた扉と新車の扉は開けない）
    const candidates = [0, 1, 2].filter((d) => d !== picked && d !== carDoor);
    opened = candidates[Math.floor(Math.random() * candidates.length)];

    // セリフを読み終えてから進めるよう、ここで一度止まれるようにする
    waitForOk("advanceArea", 1200, () => {
      unitAt(opened).classList.add("open");
      unitAt(opened).querySelector(".tag").textContent = t("game.tagOpened");
      setTimeout(showDecision, 900);
    });
  }

  function showDecision() {
    phase = "decide";
    setSteps(3);
    const other = [0, 1, 2].find((d) => d !== picked && d !== opened);
    message.innerHTML = t("game.decide_html", { o: opened + 1, p: picked + 1, c: other + 1 });
    $("switchNote").textContent = t("game.btnSwitchNote", { c: other + 1 });
    $("stayNote").textContent = t("game.btnStayNote", { p: picked + 1 });
    $("decisionArea").style.display = "flex";
  }

  function decide(didSwitch) {
    if (phase !== "decide") return;
    phase = "result";
    $("decisionArea").style.display = "none";
    setSteps(4);

    const finalDoor = didSwitch
      ? [0, 1, 2].find((d) => d !== picked && d !== opened)
      : picked;
    const won = finalDoor === carDoor;

    if (didSwitch) {
      unitAt(picked).classList.remove("chosen");
      unitAt(finalDoor).classList.add("chosen");
      unitAt(picked).querySelector(".tag").textContent = t("game.tagFirst");
      unitAt(finalDoor).querySelector(".tag").textContent = t("game.tagAfter");
    }

    // 全部の扉を開けて答え合わせ
    for (let k = 0; k < 3; k++) unitAt(k).classList.add("open");

    const key = didSwitch ? "switch" : "stay";
    manual[key].total += 1;
    if (won) manual[key].win += 1;
    renderManual();

    const banner = $("resultBanner");
    banner.className = "result-banner " + (won ? "win" : "lose");
    banner.textContent = won
      ? t("game.win", { n: finalDoor + 1 })
      : t("game.lose", { n: finalDoor + 1, c: carDoor + 1 });

    message.innerHTML = didSwitch ? t("game.afterSwitch_html") : t("game.afterStay_html");

    $("retryArea").style.display = "flex";
  }

  /* ---------- 記録の表示 ---------- */
  function pct(win, total) {
    return total === 0 ? "—" : num(100 * win / total, 1) + " %";
  }
  function times(n) { return t("common.times", { n: n }); }
  function renderManual() {
    $("mSwitchTotal").textContent = times(manual.switch.total);
    $("mSwitchWin").textContent = times(manual.switch.win);
    $("mSwitchRate").textContent = pct(manual.switch.win, manual.switch.total);
    $("mStayTotal").textContent = times(manual.stay.total);
    $("mStayWin").textContent = times(manual.stay.win);
    $("mStayRate").textContent = pct(manual.stay.win, manual.stay.total);
  }

  /* ---------- 一括シミュレーション ---------- */
  function runTrials(n) {
    // 各試行：新車の位置と最初の選択をランダムに決める。
    // 「変えない作戦」は最初の選択が新車ならあたり。
    // 「変える作戦」は最初の選択が新車でなければ、司会者がもう1つの
    // ヤギを開けるため、のこる扉はかならず新車 → あたり。
    for (let t = 0; t < n; t++) {
      const car = Math.floor(Math.random() * 3);
      const pick = Math.floor(Math.random() * 3);
      sim.stay.total += 1;
      if (pick === car) sim.stay.win += 1;
      sim.switch.total += 1;
      if (pick !== car) sim.switch.win += 1;
    }
    renderSim();
    $("simStatus").textContent = t("sim.statusRan", { n: n, t: sim.switch.total });
  }

  function renderSim() {
    const swRate = sim.switch.total ? 100 * sim.switch.win / sim.switch.total : 0;
    const stRate = sim.stay.total ? 100 * sim.stay.win / sim.stay.total : 0;
    $("barSwitch").style.width = swRate + "%";
    $("barStay").style.width = stRate + "%";
    $("barSwitchLabel").textContent = sim.switch.total
      ? t("sim.barValue", { r: num(swRate, 1), w: sim.switch.win, t: sim.switch.total }) : t("sim.notYet");
    $("barStayLabel").textContent = sim.stay.total
      ? t("sim.barValue", { r: num(stRate, 1), w: sim.stay.win, t: sim.stay.total }) : t("sim.notYet");
    $("sSwitchTotal").textContent = times(sim.switch.total);
    $("sSwitchWin").textContent = times(sim.switch.win);
    $("sSwitchRate").textContent = pct(sim.switch.win, sim.switch.total);
    $("sStayTotal").textContent = times(sim.stay.total);
    $("sStayWin").textContent = times(sim.stay.win);
    $("sStayRate").textContent = pct(sim.stay.win, sim.stay.total);
  }

  /* ---------- イベント ---------- */
  $("btnOk").addEventListener("click", () => advanceFrom("advanceArea", false));
  $("btnAuto").addEventListener("click", () => advanceFrom("advanceArea", true));
  $("btnStepMode").addEventListener("click", () => setFlowMode("step"));
  $("btnSwitch").addEventListener("click", () => decide(true));
  $("btnStay").addEventListener("click", () => decide(false));
  $("btnRetry").addEventListener("click", newGame);
  document.querySelectorAll("[data-trials]").forEach((b) =>
    b.addEventListener("click", () => runTrials(parseInt(b.dataset.trials, 10))));
  $("btnSimReset").addEventListener("click", () => {
    sim.switch.total = 0; sim.switch.win = 0;
    sim.stay.total = 0; sim.stay.win = 0;
    renderSim();
    $("simStatus").textContent = t("sim.statusCleared");
  });

  newGame();

  /* ================= 扉の数を変える拡張版 ================= */
  // mode "all" … 閉じた扉が残り1枚になるまで司会者が開ける（変える勝率 (N-1)/N）
  // mode "one" … 司会者はヤギの扉を1枚だけ開ける（変える勝率 ((N-1)/N)/(N-2)）
  const ext = {
    n: 3, mode: "all",
    car: -1, pick: -1, opened: new Set(), phase: "pick",
    play: { switch: { total: 0, win: 0 }, stay: { total: 0, win: 0 } },
    sim: { switch: { total: 0, win: 0 }, stay: { total: 0, win: 0 } }
  };
  const extStage = $("extStage");
  const extMsg = $("extMessage");

  function randInt(m) { return Math.floor(Math.random() * m); }

  // 司会者が開ける扉の一覧を返す（新車の扉とプレイヤーの扉は開けない）
  function hostOpens(n, car, pick, mode) {
    const goats = [];
    for (let d = 0; d < n; d++) if (d !== pick && d !== car) goats.push(d);
    if (mode === "one") return [goats[randInt(goats.length)]];
    // 残り1枚になるまで開ける：閉じたまま残す1枚を決めてから、それ以外のヤギを開ける
    const keep = pick === car ? goats[randInt(goats.length)] : car;
    return goats.filter((d) => d !== keep);
  }

  function extCols(n) { return n <= 5 ? n : n <= 12 ? 6 : 10; }

  function buildExtDoors() {
    extStage.style.gridTemplateColumns = `repeat(${extCols(ext.n)}, minmax(0, 1fr))`;
    extStage.innerHTML = "";
    for (let i = 0; i < ext.n; i++) {
      const d = document.createElement("div");
      d.className = "mini";
      d.dataset.index = i;
      d.setAttribute("role", "button");
      d.setAttribute("tabindex", "0");
      d.setAttribute("aria-label", t("game.doorLabel", { n: i + 1 }));
      d.innerHTML = (ext.n <= 12 ? `<span>${i + 1}</span>` : "") + `<span class="knob-dot"></span>`;
      const act = () => extClick(i);
      d.addEventListener("click", act);
      d.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); act(); }
      });
      extStage.appendChild(d);
    }
  }

  function extTile(i) { return extStage.children[i]; }

  function extNewGame() {
    ext.car = randInt(ext.n);
    ext.pick = -1; ext.opened = new Set(); ext.phase = "pick";
    buildExtDoors();
    extStage.classList.add("pickable");
    extStage.classList.remove("switchable");
    cancelPending("extAdvanceArea");
    $("extActions").style.display = "none";
    $("extRetryArea").style.display = "none";
    const b = $("extBanner"); b.className = "result-banner"; b.textContent = "";
    extMsg.innerHTML = t("ext.intro_html", { n: ext.n, m: ext.n - 1 });
  }

  function extClick(i) {
    if (ext.phase === "pick") return extDoPick(i);
    if (ext.phase === "decide" && i !== ext.pick && !ext.opened.has(i)) return extFinish(i, true);
  }

  function extDoPick(i) {
    ext.phase = "opening";
    ext.pick = i;
    extStage.classList.remove("pickable");
    extTile(i).classList.add("picked");

    const list = hostOpens(ext.n, ext.car, ext.pick, ext.mode);
    extMsg.innerHTML = t("ext.opening_html", { p: i + 1, k: list.length });

    // セリフを読み終えてから進めるよう、ここで一度止まれるようにする
    waitForOk("extAdvanceArea", 400, () => {
      // 枚数が多いときは順番に開けて、減っていく様子を見せる
      const step = Math.max(8, Math.min(60, Math.round(900 / Math.max(1, list.length))));
      list.forEach((d, k) => setTimeout(() => {
        ext.opened.add(d);
        const t = extTile(d);
        t.classList.add("open");
        t.innerHTML = "🐐";
      }, k * step));

      setTimeout(() => {
        ext.phase = "decide";
        extStage.classList.add("switchable");
        const closed = [];
        for (let d = 0; d < ext.n; d++) if (d !== ext.pick && !ext.opened.has(d)) closed.push(d);
        extMsg.innerHTML = ext.mode === "all"
          ? t("ext.decideAll_html", { k: list.length, p: ext.pick + 1, c: closed[0] + 1 })
          : t("ext.decideOne_html", { c: closed.length });
        $("extActions").style.display = "flex";
      }, list.length * step + 350);
    });
  }

  function extFinish(finalIdx, didSwitch) {
    if (ext.phase !== "decide") return;
    ext.phase = "result";
    extStage.classList.remove("switchable");
    $("extActions").style.display = "none";

    // 残りの扉をすべて開けて答え合わせ
    for (let d = 0; d < ext.n; d++) {
      const t = extTile(d);
      if (!t.classList.contains("open")) {
        t.classList.add("open");
        t.innerHTML = d === ext.car ? "🚗" : "🐐";
      }
    }
    extTile(ext.pick).classList.remove("picked");
    extTile(finalIdx).classList.add("final");

    const won = finalIdx === ext.car;
    const key = didSwitch ? "switch" : "stay";
    ext.play[key].total += 1;
    if (won) ext.play[key].win += 1;
    renderExtPlay();

    const b = $("extBanner");
    b.className = "result-banner " + (won ? "win" : "lose");
    b.textContent = won
      ? t("ext.win", { n: finalIdx + 1 })
      : t("ext.lose", { n: finalIdx + 1, c: ext.car + 1 });
    extMsg.innerHTML = didSwitch ? t("ext.afterSwitch_html") : t("ext.afterStay_html");
    $("extRetryArea").style.display = "flex";
  }

  function renderExtPlay() {
    $("eSwitchTotal").textContent = times(ext.play.switch.total);
    $("eSwitchWin").textContent = times(ext.play.switch.win);
    $("eSwitchRate").textContent = pct(ext.play.switch.win, ext.play.switch.total);
    $("eStayTotal").textContent = times(ext.play.stay.total);
    $("eStayWin").textContent = times(ext.play.stay.win);
    $("eStayRate").textContent = pct(ext.play.stay.win, ext.play.stay.total);
  }

  /* ---- この設定でのシミュレーション ---- */
  function extRunTrials(n) {
    for (let t = 0; t < n; t++) {
      const car = randInt(ext.n);
      const pick = randInt(ext.n);
      ext.sim.stay.total += 1;
      if (pick === car) ext.sim.stay.win += 1;

      const opened = hostOpens(ext.n, car, pick, ext.mode);
      const closed = [];
      for (let d = 0; d < ext.n; d++) if (d !== pick && opened.indexOf(d) < 0) closed.push(d);
      const moveTo = closed[randInt(closed.length)];   // 閉じた扉から1つを選んで乗り換える
      ext.sim.switch.total += 1;
      if (moveTo === car) ext.sim.switch.win += 1;
    }
    renderExtSim();
    $("extSimStatus").textContent = t("ext.simRan", {
      d: ext.n,
      mode: ext.mode === "all" ? t("ext.modeAllShort") : t("ext.modeOneShort"),
      n: n, t: ext.sim.switch.total
    });
  }

  // 値が小さいほど桁を増やす（1.0％ と 1.01％ が同じに見えないように）
  function fmtPct(v) { return num(v, v >= 10 ? 1 : 2); }

  // 計算で求めた「変える作戦」の勝率
  function extTheorySwitch() {
    const n = ext.n;
    return ext.mode === "all" ? (n - 1) / n : ((n - 1) / n) / (n - 2);
  }

  function renderExtSim() {
    const sw = ext.sim.switch, st = ext.sim.stay;
    const swRate = sw.total ? 100 * sw.win / sw.total : 0;
    const stRate = st.total ? 100 * st.win / st.total : 0;
    $("extBarSwitch").style.width = swRate + "%";
    $("extBarStay").style.width = stRate + "%";
    $("extBarSwitchLabel").textContent = sw.total
      ? t("sim.barValue", { r: fmtPct(swRate), w: sw.win, t: sw.total }) : t("sim.notYet");
    $("extBarStayLabel").textContent = st.total
      ? t("sim.barValue", { r: fmtPct(stRate), w: st.win, t: st.total }) : t("sim.notYet");
  }

  function renderExtTheory() {
    const n = ext.n;
    const ts = 100 * extTheorySwitch(), ty = 100 / n;
    $("extRefSwitch").style.insetInlineStart = ts + "%";
    $("extRefStay").style.insetInlineStart = ty + "%";
    $("extChartTitle").textContent = t("ext.chartTitle", { s: fmtPct(ts), y: fmtPct(ty) });
    if (ext.mode === "all") {
      $("extTheory").innerHTML = t("ext.theoryAll_html", { n: n, m: n - 1, ty: fmtPct(ty), s: fmtPct(ts) });
    } else if (n === 3) {
      $("extTheory").innerHTML = t("ext.theoryOne3_html", { s: fmtPct(ts), ty: fmtPct(ty) });
    } else {
      $("extTheory").innerHTML = t("ext.theoryOneN_html", { c: n - 2, s: fmtPct(ts), ty: fmtPct(ty) });
    }
  }

  function extSetN(n) {
    ext.n = Math.max(3, Math.min(200, Math.floor(n) || 3));
    $("extNInput").value = ext.n;
    document.querySelectorAll("[data-n]").forEach((b) =>
      b.classList.toggle("on", parseInt(b.dataset.n, 10) === ext.n));
    extResetSim();
    renderExtTheory();
    extNewGame();
  }

  function extSetMode(m) {
    ext.mode = m;
    document.querySelectorAll("[data-mode]").forEach((b) =>
      b.classList.toggle("on", b.dataset.mode === m));
    extResetSim();
    renderExtTheory();
    extNewGame();
  }

  function extResetSim() {
    ext.sim = { switch: { total: 0, win: 0 }, stay: { total: 0, win: 0 } };
    renderExtSim();
  }

  document.querySelectorAll("[data-n]").forEach((b) =>
    b.addEventListener("click", () => extSetN(parseInt(b.dataset.n, 10))));
  document.querySelectorAll("[data-mode]").forEach((b) =>
    b.addEventListener("click", () => extSetMode(b.dataset.mode)));
  $("extNInput").addEventListener("change", (e) => extSetN(parseInt(e.target.value, 10)));
  $("btnExtOk").addEventListener("click", () => advanceFrom("extAdvanceArea", false));
  $("btnExtAuto").addEventListener("click", () => advanceFrom("extAdvanceArea", true));
  $("btnExtStepMode").addEventListener("click", () => setFlowMode("step"));
  $("btnExtStay").addEventListener("click", () => extFinish(ext.pick, false));
  $("btnExtRetry").addEventListener("click", extNewGame);
  document.querySelectorAll("[data-ext-trials]").forEach((b) =>
    b.addEventListener("click", () => extRunTrials(parseInt(b.dataset.extTrials, 10))));
  $("btnExtSimReset").addEventListener("click", () => {
    extResetSim();
    $("extSimStatus").textContent = t("sim.statusCleared");
  });

  /* ---------- 言語メニュー ---------- */
  function buildLangMenu() {
    const ul = $("langMenu");
    ul.innerHTML = "";
    LANG_ORDER.forEach((code) => {
      const li = document.createElement("li");
      li.setAttribute("role", "option");
      li.setAttribute("tabindex", "0");
      li.setAttribute("aria-selected", code === LANG ? "true" : "false");
      li.textContent = I18N[code]["lang.name"];
      li.lang = code;
      if (code === LANG) li.className = "on";
      const choose = () => { setLang(code); closeLangMenu(); $("langBtn").focus(); };
      li.addEventListener("click", choose);
      li.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); choose(); }
      });
      ul.appendChild(li);
    });
  }
  function openLangMenu() {
    $("langMenu").hidden = false;
    $("langBtn").setAttribute("aria-expanded", "true");
  }
  function closeLangMenu() {
    $("langMenu").hidden = true;
    $("langBtn").setAttribute("aria-expanded", "false");
  }
  $("langBtn").addEventListener("click", (e) => {
    e.stopPropagation();
    if ($("langMenu").hidden) openLangMenu(); else closeLangMenu();
  });
  document.addEventListener("click", (e) => {
    if (!$("langMenu").hidden && !e.target.closest(".langbar")) closeLangMenu();
  });
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && !$("langMenu").hidden) { closeLangMenu(); $("langBtn").focus(); }
  });

  function setLang(code) {
    if (!I18N[code]) return;
    LANG = code;
    try { localStorage.setItem("mh_lang", code); } catch (e) { /* 保存できなくても続行 */ }
    buildLangMenu();
    applyI18n();
  }

  // 表示中の文言をすべて選択中の言語に差し替える
  function applyI18n() {
    const rtl = RTL_LANGS.indexOf(LANG) >= 0;
    document.documentElement.lang = LANG;
    document.documentElement.dir = rtl ? "rtl" : "ltr";
    document.title = t("meta.title");

    document.querySelectorAll("[data-i18n]").forEach((el) => {
      el.textContent = t(el.getAttribute("data-i18n"));
    });
    document.querySelectorAll("[data-i18n-html]").forEach((el) => {
      el.innerHTML = t(el.getAttribute("data-i18n-html"));
    });
    document.querySelectorAll("[data-n]").forEach((b) => {
      b.textContent = t("ext.chipDoors", { n: b.dataset.n });
    });
    $("extNInput").setAttribute("aria-label", t("ext.customAria"));
    $("langBtnLabel").textContent = t("lang.button");

    // 研究室のクレジット（リンクは言語によらず同じ）
    const lab = $("footerLab");
    const open = LANG === "ja" ? "（" : " (";
    const close = LANG === "ja" ? "）" : ")";
    lab.textContent = t("footer.lab") + open;
    const a = document.createElement("a");
    a.href = "https://tsuji-lab.net";
    a.textContent = "tsuji-lab.net";
    lab.appendChild(a);
    lab.appendChild(document.createTextNode(close));

    // 記録は残したまま、表示と進行中のゲームだけ作り直す
    $("simStatus").textContent = t("sim.statusInit");
    $("extSimStatus").textContent = t("ext.simInit");
    renderManual();
    renderSim();
    renderExtPlay();
    renderExtSim();
    renderExtTheory();
    newGame();
    extNewGame();
  }

  // 起動時の言語：URLの ?lang= → 前回の選択 → ブラウザの設定 → 日本語
  function initLang() {
    const fromUrl = new URLSearchParams(location.search).get("lang");
    if (fromUrl && I18N[fromUrl]) return fromUrl;
    try {
      const saved = localStorage.getItem("mh_lang");
      if (saved && I18N[saved]) return saved;
    } catch (e) { /* 参照できなければ次の判定へ */ }
    const nav = (navigator.language || "").toLowerCase();
    if (nav.indexOf("zh") === 0) {
      return (nav.indexOf("tw") >= 0 || nav.indexOf("hk") >= 0 || nav.indexOf("hant") >= 0) ? "zh-Hant" : "zh-Hans";
    }
    const two = nav.split("-")[0];
    const hit = LANG_ORDER.filter((c) => c.toLowerCase() === two)[0];
    return hit || "ja";
  }

  extSetMode("all");
  extSetN(3);
  renderFlowNotes();
  LANG = initLang();
  buildLangMenu();
  applyI18n();
})();
</script>
</body>
</html>
